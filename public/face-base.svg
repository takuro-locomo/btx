<?xml version="1.0" encoding="UTF-8"?>
<!--
  face-base.svg — 美容クリニック向け「盛れる」正面顔 v2
  座標系: 500×600 / 人体比率（三分割法・目は顔の縦中央付近）で再設計

  ランドマーク（PatientFaceView v2 のしわ座標と整合）:
    髪際 y155 / 眉 y245 / 目 中心 y271 / 鼻基部 y340 / 口 中心 y392 / 顎先 y448
    左目 外眼角(186,272) 内眼角(228,270) 中心(207,271)
    右目 外眼角(314,272) 内眼角(272,270) 中心(293,271)
    眉間 中央(250,272)  鼻翼(236,340)/(264,340)  口角(218,392)/(282,392)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
<defs>
  <radialGradient id="g_face" cx="50%" cy="40%" r="62%">
    <stop offset="0%"   stop-color="#fff4ec"/>
    <stop offset="52%"  stop-color="#ffe0d0"/>
    <stop offset="84%"  stop-color="#f8cab0"/>
    <stop offset="100%" stop-color="#efb89a"/>
  </radialGradient>
  <linearGradient id="g_neck" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f6cfb5"/><stop offset="100%" stop-color="#eaba98"/>
  </linearGradient>
  <linearGradient id="g_shoulder" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f8d5bd"/><stop offset="100%" stop-color="#f0c2a0"/>
  </linearGradient>
  <radialGradient id="g_lip" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#ff9d9d"/><stop offset="100%" stop-color="#ea6f83"/>
  </radialGradient>
  <radialGradient id="g_ear" cx="60%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#ffe0d0"/><stop offset="100%" stop-color="#eeb896"/>
  </radialGradient>
  <linearGradient id="g_hair" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6b4a34"/><stop offset="100%" stop-color="#452e1e"/>
  </linearGradient>
  <linearGradient id="g_hair_lt" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8a6146"/><stop offset="100%" stop-color="#674631"/>
  </linearGradient>
  <radialGradient id="g_iris" cx="50%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#8a6244"/><stop offset="55%" stop-color="#5e3d26"/><stop offset="100%" stop-color="#3a2414"/>
  </radialGradient>
  <clipPath id="clip_eye_l"><path d="M 186,272 Q 200,254 208,253 Q 220,254 228,270 Q 218,289 207,290 Q 195,287 186,272 Z"/></clipPath>
  <clipPath id="clip_eye_r"><path d="M 314,272 Q 300,254 292,253 Q 280,254 272,270 Q 282,289 293,290 Q 305,287 314,272 Z"/></clipPath>
</defs>

<rect width="500" height="600" fill="#ffffff"/>

<!-- ===== 肩・デコルテ ===== -->
