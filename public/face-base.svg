    <linearGradient id="rightShadow" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#9a6838" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9a6838" stop-opacity="0"/>
    </linearGradient>
    <!-- 首グラデーション -->
    <linearGradient id="neckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d8a070"/>
      <stop offset="100%" stop-color="#c08860"/>
    </linearGradient>
    <!-- 目クリップ -->
    <clipPath id="lEyeClip">
