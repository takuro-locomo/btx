  C 240,494 230,492 216,486
  C 188,472 166,448 150,412
  C 135,378 126,338 122,295
  C 118,252 118,202 138,162
  C 160,118 210,98 250,98 Z
" fill="url(#g_face)" stroke="#d4905a" stroke-width="1.8"/>

<!-- 顔の立体感シェーディング（極めて薄く） -->
<!-- 側面の陰影 -->
<path d="M122,240 C118,280 120,320 128,358 C136,390 146,418 158,440"
  fill="none" stroke="#c07840" stroke-width="32" stroke-linecap="round" opacity="0.07"/>
<path d="M378,240 C382,280 380,320 372,358 C364,390 354,418 342,440"
  fill="none" stroke="#c07840" stroke-width="32" stroke-linecap="round" opacity="0.07"/>
