<path d="M 170,207 Q 188,194 201,192 Q 217,191 231,200"
  stroke="#aa7840" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

<!-- 右眉: 眉頭(332,208) 眉山(302,193) 眉尻(267,200) -->
<path d="M 332,208 Q 314,193 300,191 Q 284,190 267,200"
  stroke="#7a4a20" stroke-width="7" stroke-linecap="round" fill="none"/>
<path d="M 330,207 Q 312,194 299,192 Q 283,191 269,200"
  stroke="#aa7840" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

<!-- ===== 目（閉眼スタイル） ===== -->
<!--
  外眼角左(172,228) 内眼角左(222,228) 中心(197,228)
