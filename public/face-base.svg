    外眼角:     (172, 228) / (328, 228)
    内眼角:     (222, 228) / (278, 228)
    鼻先:       (250, 350)
    鼻翼外縁:   (228, 345) / (272, 345)
    口中央:     (250, 418)
    口角:       (220, 418) / (280, 418)
    顎先:       (250, 502)
    下顎角:     (155, 458) / (345, 458)
-->
