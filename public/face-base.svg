<path d="M 142,195 C 138,218 136,245 138,268" fill="none" stroke="#9a6535" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
<path d="M 358,195 C 362,218 364,245 362,268" fill="none" stroke="#9a6535" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

<!-- ===== 眉毛 ===== -->
<!-- 左眉: 眉頭(168,208) 眉山(198,193) 眉尻(233,200) -->
<path d="M 168,208 Q 186,193 200,191 Q 216,190 233,200"
