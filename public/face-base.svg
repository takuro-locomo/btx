<path d="M250,252 C250,290 250,320 250,342" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.22"/>

<!-- ===== 耳 ===== -->
<!-- 左耳: 顔の左端 x≈122, 耳たぶ y≈275〜330 -->
<path d="M 122,272 C 104,262 91,280 93,302 C 95,324 110,338 124,332
         C 118,322 113,308 115,294 C 117,282 120,275 122,272 Z"
  fill="url(#g_ear)" stroke="#d4905a" stroke-width="1.4"/>
<!-- 耳甲介の曲線 -->
<path d="M 107,284 C 110,296 110,312 107,322" fill="none" stroke="#d4905a" stroke-width="1.2" opacity="0.38"/>
<path d="M 113,290 C 115,300 115,314 112,320" fill="none" stroke="#d4905a" stroke-width="0.8" opacity="0.28"/>

<!-- 右耳 -->
<path d="M 378,272 C 396,262 409,280 407,302 C 405,324 390,338 376,332
