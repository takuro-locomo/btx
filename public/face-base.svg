<?xml version="1.0" encoding="UTF-8"?>
<!--
  face-base.svg — 日本美容イラスト風 正面顔（閉眼・清潔感スタイル）
  座標系: 500×600  /  参考: photolibrary風フラットイラスト

  固定ランドマーク（zones.ts 整合）:
    眉中央左(200,200) 眉中央右(300,200)
    外眼角左(172,228) 外眼角右(328,228)
    内眼角左(222,228) 内眼角右(278,228)
    鼻翼左(228,348)   鼻翼右(272,348)
    口角左(220,418)   口角右(280,418)
    下顎角左(155,455) 下顎角右(345,455)
    顎先(250,494)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
<defs>
  <!-- 肌グラデーション：中央やや上が明るい -->
  <radialGradient id="g_face" cx="50%" cy="32%" r="60%">
    <stop offset="0%"   stop-color="#fde8cc"/>
    <stop offset="55%"  stop-color="#f5c8a0"/>
    <stop offset="88%"  stop-color="#e8a870"/>
    <stop offset="100%" stop-color="#d89058"/>
  </radialGradient>
  <!-- 首 -->
  <linearGradient id="g_neck" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#f0bc90"/>
    <stop offset="100%" stop-color="#e0a070"/>
  </linearGradient>
  <!-- 肩 -->
  <linearGradient id="g_shoulder" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#f2c09a"/>
    <stop offset="100%" stop-color="#e8aa78"/>
  </linearGradient>
  <!-- 下唇グラデーション -->
  <radialGradient id="g_lip" cx="50%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#f0b0a8"/>
    <stop offset="100%" stop-color="#d88888"/>
  </radialGradient>
  <!-- 耳 -->
  <radialGradient id="g_ear" cx="60%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#f5c8a0"/>
    <stop offset="100%" stop-color="#e0a070"/>
  </radialGradient>
</defs>

<!-- ===== 背景 ===== -->
<rect width="500" height="600" fill="#ffffff"/>

<!-- ===== 肩（デコルテ） ===== -->
<path d="M 60,600 L 60,540 Q 100,510 155,505 Q 180,500 218,495
         L 218,490 Q 235,500 250,502 Q 265,500 282,490
         L 282,495 Q 320,500 345,505 Q 400,510 440,540 L 440,600 Z"
  fill="url(#g_shoulder)"/>
<!-- 鎖骨ライン（左） -->
<path d="M 155,505 Q 200,492 218,490" fill="none" stroke="#d4905a" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
<!-- 鎖骨ライン（右） -->
<path d="M 345,505 Q 300,492 282,490" fill="none" stroke="#d4905a" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

<!-- ===== 首 ===== -->
<path d="M 218,490 Q 210,530 208,570 L 292,570 Q 290,530 282,490
         Q 265,502 250,503 Q 235,502 218,490Z"
  fill="url(#g_neck)" stroke="#d4905a" stroke-width="1.2" stroke-linejoin="round"/>
<!-- 胸鎖乳突筋ライン（左） -->
<path d="M 220,495 C 216,520 214,548 213,570" fill="none" stroke="#d4905a" stroke-width="1" opacity="0.28"/>
<!-- 胸鎖乳突筋ライン（右） -->
<path d="M 280,495 C 284,520 286,548 287,570" fill="none" stroke="#d4905a" stroke-width="1" opacity="0.28"/>

<!-- ===== 顔輪郭 ===== -->
<!-- 美容イラスト典型: 額広め・頬骨なだらか・顎先やや尖り気味の卵形 -->
