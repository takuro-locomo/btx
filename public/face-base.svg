<?xml version="1.0" encoding="UTF-8"?>
<!--
  face-base.svg — 医療教育用 正面顔イラスト（リアル寄り）
  座標系: 500x600

  医学的ランドマーク (zones.ts / WrinkleLayer と一致):
    眉毛中央:   (200, 200) / (300, 200)
    眼窩上縁:   y ≒ 215
    外眼角:     (172, 228) / (328, 228)
    内眼角:     (222, 228) / (278, 228)
    鼻先:       (250, 358)
    鼻翼外縁:   (230, 348) / (270, 348)
    口中央:     (250, 418)
    口角:       (220, 418) / (280, 418)
    顎先:       (250, 502)
    下顎角:     (155, 458) / (345, 458)
-->
