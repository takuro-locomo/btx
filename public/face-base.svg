<!--
  face-base.svg — 医療教育用 正面顔イラスト
  座標系: 500×600
  ネオクラシカル比率（顔を3等分）で設計:
    第1/3: 生え際(y=148) → 眉(y=205)
    第2/3: 眉(y=205)     → 鼻底(y=348)
    第3/3: 鼻底(y=348)   → 顎(y=494)
  幅: 顔最広部(頬骨)=266px (x=117〜383), 顔中心x=250

  固定ランドマーク (zones.ts と一致):
    眉中央左:  (200, 200)  眉中央右: (300, 200)
    外眼角左:  (172, 228)  外眼角右: (328, 228)
    内眼角左:  (222, 228)  内眼角右: (278, 228)
    鼻翼左:   (228, 348)  鼻翼右:  (272, 348)
    口角左:   (220, 418)  口角右:  (280, 418)
    下顎角左: (155, 455)  下顎角右:(345, 455)
    顎先:     (250, 494)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
<defs>
  <!-- 肌 放射グラデーション(前額〜頬にかけて中心明) -->
  <radialGradient id="g_skin" cx="50%" cy="38%" r="54%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#f4c99a"/>
    <stop offset="50%"  stop-color="#dfa070"/>
    <stop offset="85%"  stop-color="#c88555"/>
    <stop offset="100%" stop-color="#b87040"/>
  </radialGradient>
  <!-- 首グラデーション -->
  <linearGradient id="g_neck" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"  stop-color="#d49565"/>
    <stop offset="100%" stop-color="#be8050"/>
  </linearGradient>
  <!-- 唇グラデーション -->
  <linearGradient id="g_lip_lo" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#c87878"/>
    <stop offset="60%"  stop-color="#de9898"/>
    <stop offset="100%" stop-color="#c87878"/>
  </linearGradient>
  <!-- 目クリップ（アーモンド形） -->
  <clipPath id="cl_leye">
    <path d="M172,228 Q185,213 197,212 Q210,213 222,228 Q210,242 197,243 Q185,242 172,228Z"/>
  </clipPath>
  <clipPath id="cl_reye">
    <path d="M278,228 Q290,213 303,212 Q316,213 328,228 Q316,242 303,243 Q290,242 278,228Z"/>
  </clipPath>
</defs>

