<path d="M 318,217 Q 320,207 320,202" stroke="#3a1e08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M 311,214 Q 312,204 312,198" stroke="#3a1e08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M 303,213 Q 303,203 303,197" stroke="#3a1e08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M 295,214 Q 294,204 293,198" stroke="#3a1e08" stroke-width="2.0" fill="none" stroke-linecap="round"/>
