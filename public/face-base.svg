  fill="url(#g_ear)" stroke="#d4905a" stroke-width="1.4"/>
<path d="M 393,284 C 390,296 390,312 393,322" fill="none" stroke="#d4905a" stroke-width="1.2" opacity="0.38"/>
<path d="M 387,290 C 385,300 385,314 388,320" fill="none" stroke="#d4905a" stroke-width="0.8" opacity="0.28"/>

<!-- ===== 髪（まとめ髪・サイドをすっきり） ===== -->
<!-- 後頭部ベース -->
<path d="
  M 128,195
  C 122,164 130,134 154,112
  C 178,90  212,80  250,80
  C 288,80  322,90  346,112
